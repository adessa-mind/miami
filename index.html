<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Adessa · Guest Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---- Brand tokens (fallbacks — swap for the repo's real tokens if reusing) ---- */
  :root{
    --sand:#F4F0E8;        /* background */
    --paper:#FBFAF6;       /* rows / surfaces */
    --ink:#3D4549;         /* Dusk — primary text */
    --muted:#8C857A;       /* secondary text */
    --line:#E7E0D3;        /* hairlines */
    --clay:#B08D6A;        /* warm accent */
    --sage:#5F7D5B;        /* checked accent */
    --sage-tint:#E6EDDF;   /* checked row fill */
    --sage-line:#CBD9C1;   /* checked row border */
    --ok:#4F8A52;          /* intake complete — green */
    --ok-tint:#E8F0E6;
    --alert:#C0432F;       /* intake missing — red */
    --alert-tint:#F6E6E1;
    --shadow:0 1px 2px rgba(61,69,73,.05), 0 8px 24px rgba(61,69,73,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--sand);
    color:var(--ink);
    font-family:"Plus Jakarta Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:0 0 calc(env(safe-area-inset-bottom) + 28px);
    min-height:100vh;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 18px;}

  /* ---- Header ---- */
  header{
    position:sticky;top:0;z-index:10;
    background:rgba(244,240,232,.86);
    backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
    border-top:3px solid var(--clay);
  }
  .head-inner{max-width:720px;margin:0 auto;padding:16px 18px 14px;}
  .brandrow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .wordmark{display:block;height:30px;width:auto;}
  .context{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .count{
    font-family:"Fraunces",serif;font-weight:400;font-size:15px;color:var(--ink);
    white-space:nowrap;
  }
  .count b{font-weight:500;}
  .count .of{color:var(--muted);}
  /* progress hairline */
  .progress{height:3px;background:var(--line);border-radius:99px;margin-top:13px;overflow:hidden;}
  .progress > i{display:block;height:100%;width:0;background:var(--sage);border-radius:99px;transition:width .35s ease;}

  /* ---- Search ---- */
  .search{position:relative;margin:14px 0 4px;}
  .search input{
    width:100%;height:48px;border:1px solid var(--line);background:var(--paper);
    border-radius:14px;padding:0 16px 0 44px;font-size:16px;color:var(--ink);
    font-family:inherit;outline:none;transition:border-color .15s, box-shadow .15s;
  }
  .search input::placeholder{color:var(--muted);}
  .search input:focus{border-color:var(--clay);box-shadow:0 0 0 3px rgba(176,141,106,.16);}
  .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);}

  /* ---- List ---- */
  .list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
  .empty{display:none;text-align:center;color:var(--muted);padding:40px 0;font-size:15px;}

  .row{
    display:flex;align-items:center;gap:14px;
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:12px 12px 12px 16px;box-shadow:var(--shadow);
    transition:background .25s ease, border-color .25s ease;
    position:relative;overflow:hidden;
  }
  .row::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:transparent;transition:background .25s ease;
  }
  .time{
    font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;
    color:var(--muted);width:74px;flex:none;letter-spacing:.01em;
  }
  .name{
    font-size:17px;font-weight:600;color:var(--ink);flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em;
  }
  .name.placeholder{font-weight:500;color:var(--muted);font-style:italic;letter-spacing:.02em;}

  .btn{
    flex:none;min-width:128px;height:48px;border-radius:12px;cursor:pointer;
    border:1px solid var(--ink);background:transparent;color:var(--ink);
    font-family:inherit;font-size:14px;font-weight:600;letter-spacing:.01em;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    transition:background .18s, color .18s, border-color .18s, transform .06s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.97);}
  .btn .check{width:16px;height:16px;display:none;}

  /* ---- Checked state ---- */
  .row.checked{background:var(--sage-tint);border-color:var(--sage-line);}
  .row.checked::before{background:var(--sage);}
  .row.checked .time{color:var(--sage);}
  .row.checked .name{color:var(--ink);}
  .row.checked .name.placeholder{color:var(--sage);font-style:normal;}
  .row.checked .btn{background:var(--sage);border-color:var(--sage);color:#fff;}
  .row.checked .btn .check{display:block;}
  .row.checked .btn .label-in{display:none;}
  .row.checked .btn .label-out{display:inline;}
  .btn .label-out{display:none;}

  /* ---- Intake indicator (host-flippable toggle) ---- */
  .intake{
    flex:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;
    min-height:40px;padding:0 12px;border-radius:10px;border:1px solid transparent;
    font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;
    transition:background .16s, color .16s, border-color .16s, transform .06s;
  }
  .intake:active{transform:scale(.96);}
  .intake svg{width:15px;height:15px;flex:none;stroke-width:2.6;}
  .intake.done{color:var(--ok);background:var(--ok-tint);border-color:#CADEC6;}
  .intake.missing{color:var(--alert);background:var(--alert-tint);border-color:#EAC9C1;}

  /* ---- Footer / reset ---- */
  footer{max-width:720px;margin:26px auto 0;padding:0 18px;text-align:center;}
  .reset{
    background:none;border:none;color:var(--muted);font-family:inherit;
    font-size:13px;cursor:pointer;padding:8px 12px;border-radius:8px;letter-spacing:.02em;
  }
  .reset:hover{color:var(--clay);}

  @media (max-width:480px){
    .wordmark{height:26px;}
    .row{gap:9px;padding-left:13px;}
    .intake{padding:0 11px;gap:0;}
    .intake .ilabel{display:none;}
    .btn{min-width:54px;width:54px;padding:0;}
    .btn .label-in, .btn .label-out{display:none !important;}
    .row.checked .btn .check{display:block;}
    .btn .plus{display:block;}
    .row.checked .btn .plus{display:none;}
  }
</style>
</head>

<script>
/* ============================================================
   GUEST LIST  — edit this array to update names / times / slots
   id    : stable unique key (check-in state is stored by id —
           never reorder-sensitive, safe with duplicate names)
   time  : display string, 12-hour AM/PM
   intake: true = green check, false/omitted = red X (required for entry).
           Sets the baseline from the spreadsheet; a host tap at the desk
           overrides it for that guest (saved separately).
   ============================================================ */

const STORAGE_KEY = "adessa-checkin-v3";
const INTAKE_KEY  = "adessa-intake-v3";

/* ---- state ---- */
function load(key){
  try { return JSON.parse(localStorage.getItem(key)) || {}; }
  catch(e){ return {}; }
}
function save(key, obj){
  try { localStorage.setItem(key, JSON.stringify(obj)); }
  catch(e){ /* storage unavailable — state stays in memory for the session */ }
}
let state = load(STORAGE_KEY);          // check-in (host action)
let intakeState = load(INTAKE_KEY);     // intake overrides (host flips)

// Effective intake status: a host flip wins; otherwise fall back to the
// spreadsheet's `intake` value for that guest.
function intakeDone(g){
  return (g.id in intakeState) ? intakeState[g.id] : (g.intake === true);
}

/* ---- sort earliest-first (robust to manual reordering of the array) ---- */
function toMinutes(t){
  const m = t.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if(!m) return 0;
  let h = parseInt(m[1],10) % 12;
  if(/PM/i.test(m[3])) h += 12;
  return h*60 + parseInt(m[2],10);
}
const ordered = [...GUESTS].sort((a,b)=>{
  const d = toMinutes(a.time) - toMinutes(b.time);
  return d !== 0 ? d : a.name.localeCompare(b.name);
});

/* ---- render ---- */
const listEl = document.getElementById("list");
const emptyEl = document.getElementById("empty");

function buildRow(g){
  const row = document.createElement("div");
  row.className = "row" + (state[g.id] ? " checked" : "");
  row.dataset.id = g.id;
  row.dataset.name = g.name.toLowerCase();

  const time = document.createElement("div");
  time.className = "time";
  time.textContent = g.time;

  const name = document.createElement("div");
  name.className = "name" + (g.placeholder ? " placeholder" : "");
  name.textContent = g.name;

  // Intake status — host-flippable. Reflects the spreadsheet value unless a
  // host has tapped it (actual intake happens on a separate computer).
  const intake = document.createElement("button");
  intake.className = "intake";
  intake.addEventListener("click", ()=> toggleIntake(g.id, intake, g.name));
  applyIntake(intake, intakeDone(g), g.name);

  const btn = document.createElement("button");
  btn.className = "btn";
  btn.setAttribute("aria-pressed", state[g.id] ? "true" : "false");
  btn.setAttribute("aria-label", "Toggle check-in for " + g.name);
  btn.innerHTML =
    '<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
    '<span class="plus" style="display:none;">＋</span>' +
    '<span class="label-in">Check In</span>' +
    '<span class="label-out">Checked In</span>';

  btn.addEventListener("click", ()=> toggle(g.id, row, btn));

  row.append(time, name, intake, btn);
  return row;
}

function toggle(id, row, btn){
  if(state[id]){ delete state[id]; }
  else { state[id] = true; }
  save(STORAGE_KEY, state);
  row.classList.toggle("checked", !!state[id]);
  btn.setAttribute("aria-pressed", state[id] ? "true" : "false");
  updateCount();
}

const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_X     = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';

function applyIntake(el, done, name){
  el.classList.toggle("done", done);
  el.classList.toggle("missing", !done);
  el.setAttribute("aria-pressed", done ? "true" : "false");
  el.setAttribute("aria-label", (done ? "Intake completed" : "Intake not completed") + " — " + name + ". Tap to change.");
  el.innerHTML = (done ? ICON_CHECK : ICON_X) + '<span class="ilabel">Intake</span>';
}

function toggleIntake(id, el, name){
  const next = !el.classList.contains("done");
  intakeState[id] = next;
  save(INTAKE_KEY, intakeState);
  applyIntake(el, next, name);
}

function render(){
  const frag = document.createDocumentFragment();
  ordered.forEach(g => frag.appendChild(buildRow(g)));
  listEl.appendChild(frag);
  document.getElementById("totalCount").textContent = ordered.length;
  updateCount();
}

function updateCount(){
  const checked = ordered.reduce((n,g)=> n + (state[g.id] ? 1 : 0), 0);
  document.getElementById("checkedCount").textContent = checked;
  const pct = ordered.length ? (checked/ordered.length*100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
}

/* ---- search ---- */
document.getElementById("search").addEventListener("input", (e)=>{
  const q = e.target.value.trim().toLowerCase();
  let visible = 0;
  listEl.querySelectorAll(".row").forEach(r=>{
    const show = !q || r.dataset.name.includes(q);
    r.style.display = show ? "" : "none";
    if(show) visible++;
  });
  emptyEl.style.display = visible ? "none" : "block";
});

/* ---- reset ---- */
document.getElementById("reset").addEventListener("click", ()=>{
  if(confirm("Reset all check-ins? This clears every guest back to not-checked-in.")){
    state = {};
    save(STORAGE_KEY, state);
    listEl.querySelectorAll(".row").forEach(r=>{
      r.classList.remove("checked");
      r.querySelector(".btn").setAttribute("aria-pressed","false");
    });
    updateCount();
  }
});

render();
</script>
</body>
</html>
