<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Adessa · AQ Output</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  /* Edge-to-edge interior color — no framing border around the content. */
  html, body { margin: 0; padding: 0; background: #FFFAF0; min-height: 100vh; }
  html { scrollbar-gutter: stable; }
  body { font-family: "Plus Jakarta Sans", sans-serif; color: #36383A; -webkit-font-smoothing: antialiased; }

  #root { display: flex; justify-content: center; padding: 20px 16px 64px; min-height: 100vh; }

  /* Whole site uses one fixed content width so nothing shifts as you navigate. */
  .aq-card {
    background: #FFFAF0;
    width: 100%;
    max-width: 1120px;
    padding: 24px 56px 72px;
    align-self: flex-start;
  }

  .aq-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    padding-bottom: 24px;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(81,83,85,0.10);
  }

  .aq-meta {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: #8C7468;
    text-align: center;
    flex: 1;
  }

  /* Stage: ring + optional side text. Centered by default; splits text-left / ring-right.
     The flex-basis transition animates the ring smaller and over to the right. */
  .aq-stage {
    padding: 40px 0 64px;
    display: flex;
    align-items: center;
    position: relative;
    /* No fixed height: the stage is exactly the ring's height (the ring is the tallest
       element), so the ring sits at the top near the header and the shorter text column
       centers on it. The text is capped below the ring height so a collapsing/re-wrapping
       column during the finale can't make the stage taller and shove the ring. */
  }
  .aq-stage-text {
    flex: 0 1 0%;
    min-width: 0;
    max-height: 420px;
    opacity: 0;
    overflow: hidden;
    transition: flex-basis 850ms cubic-bezier(0.22,1,0.36,1), opacity 300ms ease;
  }
  .aq-stage-ring {
    flex: 1 1 100%;
    min-width: 0;
    position: relative;
    display: flex;
    justify-content: center;
    transition: flex-basis 850ms cubic-bezier(0.22,1,0.36,1);
  }
  .aq-stage.is-split .aq-stage-text {
    flex-basis: 48%;
    opacity: 1;
    padding-right: 44px;
  }
  .aq-stage.is-split .aq-stage-ring { flex-basis: 52%; }

  .aq-ring-sizer {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 640px;
  }

  .aq-key {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .aq-key-row {
    display: flex;
    justify-content: center;
    gap: 96px;
    flex-wrap: wrap;
  }

  .aq-domain-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 64px;
    align-items: start;
  }

  .aq-signals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 32px;
  }

  @media (max-width: 700px) {
    #root { padding: 0 0 48px; }
    .aq-card { padding: 28px 20px 48px; }
    .aq-key-row { gap: 40px; }
    .aq-domain-grid { grid-template-columns: 1fr; gap: 32px; }
    .aq-ring-wrap { padding: 40px 0 48px; }
  }

  @media (max-width: 480px) {
    .aq-card { padding: 20px 16px 40px; }
    .aq-signals-grid { grid-template-columns: 1fr; gap: 16px 0; }
  }

  /* ── Intro / onboarding ─────────────────────────────────────────────── */
  .aq-intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 350ms cubic-bezier(0.22,1,0.36,1);
  }
  .aq-intro-inner {
    max-width: 560px;
    margin: 8px auto 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 30px;
  }
  /* Overlay mode — content floats over the ring inside a translucent light box */
  .aq-intro--overlay {
    position: absolute;
    inset: 0;
    justify-content: center;
    padding: 24px;
  }
  .aq-intro--overlay .aq-intro-inner {
    margin: 0;
    gap: 22px;
    padding: 40px 38px;
    background: rgba(233,228,217,0.78);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    border: 1px solid rgba(81,83,85,0.08);
    border-radius: 10px;
    box-shadow: 0 10px 60px rgba(54,56,58,0.07);
  }
  /* Title screen (overlay): keep the one-line intro on a single line */
  .aq-intro--overlay.aq-intro--title .aq-intro-inner { max-width: none; }
  .aq-intro--overlay.aq-intro--title .aq-intro-body p { white-space: nowrap; max-width: none; }
  /* Eyebrow above the headline — matches the reading-guide key (small caps, #8C7468) */
  .aq-intro-eyebrow {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.22em; color: #8C7468;
    margin-bottom: 12px;
  }
  .aq-intro-title {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: 36px; line-height: 1.12; letter-spacing: -0.01em;
    color: #1F2123; margin: 0;
  }
  .aq-intro-body { margin: 0; }
  .aq-intro-body p {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: 18px; line-height: 1.6; color: #36383A;
    margin: 0 0 18px; max-width: 52ch;
  }
  .aq-intro-body p:last-child { margin-bottom: 0; }
  .aq-intro-body strong { font-weight: 600; }
  .aq-intro-actions { margin-top: 6px; }
  /* Split mode — content sits in a left column beside the ring, left-aligned */
  .aq-intro--split { align-items: flex-start; width: 100%; }
  .aq-intro--split .aq-intro-inner {
    margin: 0;
    max-width: none;
    align-items: flex-start;
    text-align: left;
  }
  .aq-intro--split .aq-intro-body p { max-width: none; }
  /* Step slides (2-5): fix the block to slide 2's height and pin the button to its
     bottom, so the CTA stays in one spot as the guest advances. */
  .aq-intro--steps .aq-intro-inner { min-height: 374px; }
  .aq-intro--steps .aq-intro-actions { margin-top: auto; }

  .aq-btn {
    background: #748485; color: #FFFAF0; border: 1px solid #748485;
    padding: 14px 32px; border-radius: 999px;
    font-family: "Plus Jakarta Sans", sans-serif; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.20em; cursor: pointer;
    transition: all 280ms cubic-bezier(0.22,1,0.36,1);
  }
  .aq-btn:hover { background: #5F6F70; border-color: #5F6F70; }
  .aq-btn:active { transform: translateY(1px); }

  /* Detail content extends down on reveal (grid-rows 0fr→1fr animates the height open).
     No background — the content sits on the card as usual. */
  .aq-detail {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 600ms cubic-bezier(0.22,1,0.36,1);
  }
  .aq-detail.is-open { grid-template-rows: 1fr; }
  .aq-detail-clip { overflow: hidden; min-height: 0; }
  .aq-fade { animation: aqFadeIn 650ms cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes aqFadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Stack the split layout on narrower screens (phones / portrait tablets): ring on top.
     Below ~1000px the ring column gets too small to stay taller than the text, so stack. */
  @media (max-width: 1000px) {
    .aq-stage { flex-direction: column; align-items: stretch; }
    .aq-stage-ring { order: -1; flex-basis: auto; }
    .aq-stage-text,
    .aq-stage.is-split .aq-stage-text {
      flex-basis: auto; opacity: 1; overflow: visible; padding-right: 0; max-height: none;
    }
    .aq-stage.is-split .aq-stage-ring { flex-basis: auto; }
    .aq-intro--split { align-items: center; }
    .aq-intro--split .aq-intro-inner { align-items: center; text-align: center; margin: 8px auto 0; max-width: 560px; }
    .aq-intro--split .aq-intro-body p { max-width: 52ch; }
  }

  @media (max-width: 700px) {
    .aq-intro-inner { gap: 24px; }
    .aq-intro--overlay { padding: 14px; }
    .aq-intro--overlay .aq-intro-inner { padding: 28px 22px; gap: 20px; }
    .aq-intro-title { font-size: 28px; }
    .aq-intro-body p { font-size: 17px; }
    /* Too narrow for the intro line to fit on one line — allow it to wrap */
    .aq-intro--overlay.aq-intro--title .aq-intro-inner { max-width: 560px; }
    .aq-intro--overlay.aq-intro--title .aq-intro-body p { white-space: normal; }
  }
  @media (prefers-reduced-motion: reduce) {
    .aq-detail { transition: none; }
  }
</style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── GUEST INPUT ────────────────────────────────────────────────────────── */
/* Name and date are provided by the calling application (TBD). To inject them,
   set window.AQ_GUEST = { name: "…", date: "…" } before this script runs.
   Until then, the name defaults to a placeholder and the date shows today. */
const GUEST_INPUT = (typeof window !== "undefined" && window.AQ_GUEST) || {};
const guestName = GUEST_INPUT.name || "Jane D.";
const guestDate = GUEST_INPUT.date ||

};

/* ─── DERIVED AQ SCORE ───────────────────────────────────────────────────── */
/* Computed from the 4 cognitive percentages so it stays correct when the real
   numbers are passed in from the upstream output.
   Letter = aqLetter of the highest-scoring cognitive domain
            (A = Attention, E = Executive function, M = Working memory, P = Processing speed)
   Digits = rounded average of the 4 cognitive percentages ("utilization"). */
(function computeAQ(data) {
  const cog = data.cognitive;
  /* Highest score wins; ties broken by alphabetical aqLetter (A, E, M, P). */
  const leadDomain = cog.reduce((best, d) => {
    if (d.score > best.score) return d;
    if (d.score === best.score && d.aqLetter < best.aqLetter) return d;
    return best;
  }, cog[0]);
  const utilization = Math.round(cog.reduce((sum, d) => sum + d.score, 0) / cog.length);
  cog.forEach(d => { d.isLead = d === leadDomain; });
  /* Lowest-scoring cognitive domain — the area of greatest growth potential.
     Ties broken by alphabetical aqLetter (A, E, M, P), matching the lead rule. */
  const growthDomain = cog.reduce((low, d) => {
    if (d.score < low.score) return d;
    if (d.score === low.score && d.aqLetter < low.aqLetter) return d;
    return low;
  }, cog[0]);
  data.aq = {
    code: `${leadDomain.aqLetter}.${utilization}`,
    lead: leadDomain.aqLetter,
    utilization,
    leadLabel: `${leadDomain.name}-led`,
    growthDomain: growthDomain.name,
  };
})(AQ_DATA);

      </g>

  );
}

/* ─── GEOMETRY ───────────────────────────────────────────────────────────── */
function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function arcPath(cx, cy, r, startDeg, endDeg) {
  const s = polar(cx, cy, r, startDeg);
  const e = polar(cx, cy, r, endDeg);
  const sweep = endDeg - startDeg;
  const large = Math.abs(sweep) <= 180 ? 0 : 1;
  const dir = sweep >= 0 ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} ${dir} ${e.x} ${e.y}`;
}

function quadrant(qIdx, baseRotation, gutter = 6) {
  const center = baseRotation + qIdx * 90;
  const leading = center - 45 + gutter;
  const trailing = center + 45 - gutter;
  return { center, leading, trailing };
}

/* ─── RING ───────────────────────────────────────────────────────────────── */
function AQRing({ onSelect = () => {}, active = null, size = 560, data, reveal, reducedMotion = false }) {
  const cx = size / 2;
  const cy = size / 2;

  const outerR = size * 0.42;
  const outerStroke = size * 0.058;
  const innerR = size * 0.28;
  const innerStroke = size * 0.034;

  const DUSK = "#515355";
  const SEA  = "#8E9BA4";

  /* Color of a cognitive domain when it is the leading domain, keyed by aqLetter.
     Non-leading cognitive domains stay DUSK. */
  const LEAD_COLORS = {
    A: "#D89048", // Attention
    E: "#5F6DA3", // Executive function
    M: "#3A8278", // Working memory
    P: "#C8645A", // Processing speed
  };

  /* Uniform "present but unscored" fill length used during the intro, before
     the guest's real values fill in. Same fraction for every arc. */
  const PLACEHOLDER = 0.55;

  /* Reveal state — each arc's fill length and opacity are driven by this so the
     intro, finale, and final visual are the same chart at different stages.
     Fill modes: "placeholder" (uniform unscored), "empty" (drawn to 0),
     "scored" (real values — geometry/color reduce exactly to the final visual). */
  const r = reveal || {};
  const outerFill     = r.outerFill || "scored";   // "placeholder" | "empty" | "scored"
  const innerFill     = r.innerFill || "scored";
  const outerOpacity  = r.outerOpacity != null ? r.outerOpacity : 1;
  const innerOpacity  = r.innerOpacity != null ? r.innerOpacity : 1;
  const outerLabels   = r.outerLabels || "full";   // "hidden" | "names" | "full"
  const innerLabels   = r.innerLabels || "full";
  const centerStage   = r.centerStage || "final";
  const centerNumber  = r.centerNumber != null ? r.centerNumber : data.aq.utilization;

  const fillFraction = (mode, score) =>
    mode === "scored" ? Math.max(0, Math.min(100, score)) / 100
    : mode === "empty" ? 0
    : PLACEHOLDER;

  const cogLeadKey = (data.cognitive.find(d => d.isLead) || data.cognitive[0]).key;

  const outerArcs = data.cognitive.map((d, i) => {
    const q = quadrant(i, 0, 6);
    const totalSpan = q.trailing - q.leading;
    const trackLen = outerR * totalSpan * Math.PI / 180;
    const fraction = fillFraction(outerFill, d.score);
    const isLead = d.key === cogLeadKey;
    return { ...d, ...q, totalSpan, trackLen, fraction, isLead,
      color: outerFill === "scored" ? (isLead ? (LEAD_COLORS[d.aqLetter] || DUSK) : DUSK) : DUSK };
  });

  const innerArcs = data.affective.map((d, i) => {
    const q = quadrant(i, 45, 8);
    const totalSpan = q.trailing - q.leading;
    const trackLen = innerR * totalSpan * Math.PI / 180;
    const fraction = fillFraction(innerFill, d.score);
    return { ...d, ...q, totalSpan, trackLen, fraction, color: SEA };
  });

  /* Fill transition. Length (stroke-dasharray) + color wipe in on the finale (all
     segments of a ring together); reduced motion skips that and cross-fades opacity. */
  const arcTransition = (delay) =>
    reducedMotion
      ? "opacity 450ms ease"
      : `stroke-dasharray 920ms cubic-bezier(0.22,1,0.36,1) ${delay}ms, stroke 700ms ease ${delay}ms, opacity 700ms ease ${delay}ms`;

  /* Wedge hit-target */
  const Wedge = ({ q, rOuter, rInner, domKey, isActive }) => {
    const sOuter = polar(cx, cy, rOuter, q.leading);
    const eOuter = polar(cx, cy, rOuter, q.trailing);
    const sInner = polar(cx, cy, rInner, q.trailing);
    const eInner = polar(cx, cy, rInner, q.leading);
    const sweep = q.trailing - q.leading;
    const large = sweep <= 180 ? 0 : 1;
    const d = `M ${sOuter.x} ${sOuter.y} A ${rOuter} ${rOuter} 0 ${large} 1 ${eOuter.x} ${eOuter.y} L ${sInner.x} ${sInner.y} A ${rInner} ${rInner} 0 ${large} 0 ${eInner.x} ${eInner.y} Z`;
    return (
      <path d={d} fill="transparent"
        style={{ cursor: "pointer" }}
        onClick={() => onSelect(domKey)} />
    );
  };

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width="100%" height="100%" style={{ overflow: "visible", display: "block" }}>
      <defs>
        {/* Outer label paths */}
        {outerArcs.map((q, i) => {
          const c = ((q.center % 360) + 360) % 360;
          const isLower = c > 90 && c < 270;
          const BASE = outerR + outerStroke / 2 + 22;
          const CAP_OFFSET = 10;
          if (isLower) {
            return <path key={`olp-${i}`} id={`olp-${i}`} d={arcPath(cx, cy, BASE + CAP_OFFSET, q.trailing, q.leading)} fill="none" />;
          }
          return <path key={`olp-${i}`} id={`olp-${i}`} d={arcPath(cx, cy, BASE, q.leading, q.trailing)} fill="none" />;
        })}

        {/* Inner label paths */}
        {innerArcs.map((q, i) => {
          const c = ((q.center % 360) + 360) % 360;
          const isLower = c > 90 && c < 270;
          const BASE = innerR - innerStroke / 2 - 12;
          const CAP_OFFSET = 9;
          const lrLow = isLower ? BASE : BASE - CAP_OFFSET;
          return (
            <path key={`ilp-${i}`} id={`ilp-${i}`}
              d={isLower ? arcPath(cx, cy, lrLow, q.trailing, q.leading) : arcPath(cx, cy, lrLow, q.leading, q.trailing)}
              fill="none" />
          );
        })}
      </defs>

      {/* OUTER tracks */}
      {outerArcs.map((q, i) => (
        <path key={`ot-${i}`} d={arcPath(cx, cy, outerR, q.leading, q.trailing)}
          fill="none" stroke="rgba(81,83,85,0.06)" strokeWidth={outerStroke} strokeLinecap="round" />
      ))}

      {/* OUTER fills — clockwise; visible length driven by fraction via stroke-dasharray */}
      {outerArcs.map((q, i) => {
        const pathD = arcPath(cx, cy, outerR, q.leading, q.trailing);
        const visible = q.fraction * q.trackLen;
        const delay = 0;   // all 4 segments wipe in together (no per-segment stagger)
        return (
          <path key={`of-${i}`} d={pathD} fill="none" stroke={q.color} strokeWidth={outerStroke} strokeLinecap="round"
            opacity={outerOpacity}
            strokeDasharray={`${visible} ${q.trackLen + 20}`}
            strokeDashoffset={0}
            style={{ transition: arcTransition(delay) }}
          />
        );
      })}

      {/* INNER tracks */}
      {innerArcs.map((q, i) => (
        <path key={`it-${i}`} d={arcPath(cx, cy, innerR, q.leading, q.trailing)}
          fill="none" stroke="rgba(81,83,85,0.06)" strokeWidth={innerStroke} strokeLinecap="round" />
      ))}

      {/* INNER fills — counterclockwise (reverse path); length driven by fraction */}
      {innerArcs.map((q, i) => {
        const pathD = arcPath(cx, cy, innerR, q.trailing, q.leading);
        const visible = q.fraction * q.trackLen;
        const delay = 0;   // all 4 segments wipe in together (no per-segment stagger)
        return (
          <path key={`if-${i}`} d={pathD} fill="none" stroke={q.color} strokeWidth={innerStroke} strokeLinecap="round"
            opacity={innerOpacity}
            strokeDasharray={`${visible} ${q.trackLen + 20}`}
            strokeDashoffset={0}
            style={{ transition: arcTransition(delay) }}
          />
        );
      })}

      {/* Wedge hit-targets */}
      {outerArcs.map((q, i) => (
        <Wedge key={`ow-${i}`} q={q} rOuter={outerR + outerStroke} rInner={outerR - outerStroke}
          domKey={q.key} isActive={active === q.key} />
      ))}
      {innerArcs.map((q, i) => (
        <Wedge key={`iw-${i}`} q={q} rOuter={innerR + innerStroke} rInner={innerR - innerStroke}
          domKey={q.key} isActive={active === q.key} />
      ))}

      {/* OUTER labels — names appear with the ring; percentages added at the finale */}
      {outerArcs.map((q, i) => (
        <g key={`ol-${i}`} style={{ opacity: outerLabels === "hidden" ? 0 : 1, transition: "opacity 600ms ease" }}>
          <text style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontWeight: 400, fontSize: 13, letterSpacing: "0.22em", textTransform: "uppercase", fill: q.isLead ? "#1F2123" : "#515355" }}>
            <textPath href={`#olp-${i}`} startOffset="50%" textAnchor="middle">
              {outerLabels === "full" ? <>{q.name.toUpperCase()}{"  ·  "}{q.score}%</> : q.name.toUpperCase()}
            </textPath>
          </text>
        </g>
      ))}

      {/* INNER labels */}
      {innerArcs.map((q, i) => (
        <g key={`il-${i}`} style={{ opacity: innerLabels === "hidden" ? 0 : 1, transition: "opacity 600ms ease" }}>
          <text style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontWeight: 400, fontSize: 11, letterSpacing: "0.20em", textTransform: "uppercase", fill: "#515355" }}>
            <textPath href={`#ilp-${i}`} startOffset="50%" textAnchor="middle">
              {innerLabels === "full" ? <>{q.name.toUpperCase()}{"  ·  "}{q.score}%</> : q.name.toUpperCase()}
            </textPath>
          </text>
        </g>
      ))}

      {/* CENTER — AQ code. Placeholder is centered in the ring; at the finale it glides
         up to make room for the descriptor while the digits count up. */}
      <text x={cx} y={cy - size * 0.045} textAnchor="middle" dominantBaseline="central"
        style={{
          fontFamily: '"Plus Jakarta Sans", sans-serif',
          fontWeight: 200,
          fontSize: size * 0.13,
          letterSpacing: "-0.02em",
          fill: "#1F2123",
          fontFeatureSettings: '"tnum" 1, "lnum" 1',
          opacity: centerStage === "hidden" ? 0 : 1,
          transform: centerStage === "final" ? "translateY(0px)" : `translateY(${size * 0.045}px)`,
          transition: "opacity 500ms cubic-bezier(0.22,1,0.36,1), transform 600ms cubic-bezier(0.22,1,0.36,1)",
        }}>
        {`${data.aq.lead}.${String(centerNumber).padStart(2, "0")}`}
      </text>

      {/* CENTER — growth descriptor (lowest cognitive domain) */}
      <text x={cx} y={cy + size * 0.060} textAnchor="middle"
        style={{
          opacity: centerStage === "final" ? 1 : 0,
          transition: "opacity 500ms cubic-bezier(0.22,1,0.36,1)",
        }}>
        <tspan x={cx} style={{
          fontFamily: '"Plus Jakarta Sans", sans-serif',
          fontWeight: 500,
          fontSize: size * 0.019,
          letterSpacing: "0.18em",
          textTransform: "uppercase",
          fill: "#8B8C8E",
        }}>Greatest potential in</tspan>
        <tspan x={cx} dy={size * 0.032} style={{
          fontFamily: '"Plus Jakarta Sans", sans-serif',
          fontWeight: 500,
          fontSize: size * 0.019,
          letterSpacing: "0.18em",
          textTransform: "uppercase",
          fill: "#8B8C8E",
        }}>{data.aq.growthDomain}</tspan>
      </text>
    </svg>
  );
}

/* ─── KEY ITEM ───────────────────────────────────────────────────────────── */

/* ─── DOMAIN SECTION ─────────────────────────────────────────────────────── */
function DomainSection({ d, ring, accent, isLead, anchor, active }) {
  const ref = useRef(null);
  useEffect(() => {
    if (active === d.key && ref.current) {
      ref.current.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, [active, d.key]);

  return (
    <section ref={ref} id={anchor} style={{ padding: "48px 0", borderTop: "1px solid rgba(81,83,85,0.10)", scrollMarginTop: 24, transition: "background 280ms cubic-bezier(0.22,1,0.36,1)", background: active === d.key ? "rgba(180,154,141,0.04)" : "transparent" }}>
      <div className="aq-domain-grid">
        <div>
          <div style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.22em", color: "#8C7468", marginBottom: 14 }}>
            — {ring === "cog" ? "Cognitive" : "Affective"}{isLead ? " · lead domain" : ""}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto", alignItems: "baseline", gap: 20, marginBottom: 18 }}>
            <h3 style={{ fontFamily: '"Fraunces", serif', fontWeight: 300, fontSize: 48, letterSpacing: "-0.015em", color: "#1F2123", margin: 0, lineHeight: 1.05 }}>{d.name}</h3>
            <span style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontWeight: 200, fontSize: 56, lineHeight: 1, color: accent, fontFeatureSettings: '"tnum" 1, "lnum" 1', letterSpacing: "-0.02em", textAlign: "right" }}>
              {d.score}<span style={{ fontSize: 22, color: "#8B8C8E" }}>%</span>
            </span>
          </div>
          <p style={{ fontFamily: '"Fraunces", serif', fontWeight: 300, fontSize: 19, lineHeight: 1.5, color: "#36383A", margin: "0 0 20px", maxWidth: "38ch" }}>{d.blurb}</p>
          <div style={{ display: "flex", gap: 14, fontFamily: '"Plus Jakarta Sans", sans-serif', fontSize: 11, fontWeight: 400, textTransform: "uppercase", letterSpacing: "0.18em", color: "#8B8C8E" }}>
            <span>Sources</span>
            {d.sources.map((s, i) => <span key={i} style={{ color: "#36383A" }}>· {s}</span>)}
          </div>
        </div>
        <div>
          <div style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.22em", color: "#8C7468", marginBottom: 18 }}>— Signals</div>
          <div className="aq-signals-grid">
            {d.metrics.map((m, i) => (
              <div key={i} style={{ paddingBottom: 14, borderBottom: "1px solid rgba(81,83,85,0.08)" }}>
                <div style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontSize: 10, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.20em", color: "#8B8C8E", marginBottom: 6 }}>{m.label}</div>
                <div style={{ fontFamily: '"Plus Jakarta Sans", sans-serif', fontWeight: 200, fontSize: 26, color: "#1F2123", fontFeatureSettings: '"tnum" 1, "lnum" 1', letterSpacing: "-0.01em" }}>{m.value}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── ARTBOARD ───────────────────────────────────────────────────────────── */
function AQArtboard() {
  const data = AQ_DATA;
  /* Fixed internal ring geometry — the SVG scales smoothly via CSS to whatever width
     its column is, so resizing/centering never re-jiggers the stroke-dash math. */
  const RING_SIZE = 640;
  const [active, setActive] = useState(null);
  const [stage, setStage] = useState(0);          // 0..4 = intro panels
  const [phase, setPhase] = useState("intro");     // "intro" | "finale" | "report"
  const [finaleStep, setFinaleStep] = useState(0); // 0 textfade · 1 wipe+center · 2 outer · 3 inner · 4 AQ · 5 key · 6 rest
  const PLACEHOLDER_AQ = 12;                        // center reads "A.12" until the finale
  const [displayNum, setDisplayNum] = useState(PLACEHOLDER_AQ);
  const [reducedMotion] = useState(() =>
    typeof window !== "undefined" && window.matchMedia
      ? window.matchMedia("(prefers-reduced-motion: reduce)").matches
      : false);

  /* Finale choreography — fires once the guest taps "See your AQ".
     Step 0: the example text fades out (ring stays put). Step 1: the ring recenters +
     grows while it wipes clean and "A.12" fades — all together. Then the outer ring
     draws in (2), the inner (3), the center AQ (4), and the detail: key (5) and rest (6). */
  useEffect(() => {
    if (phase !== "finale") return;
    if (reducedMotion) {
      setFinaleStep(4);
      const t = setTimeout(() => setPhase("report"), 500);
      return () => clearTimeout(t);
    }
    const timers = [
      setTimeout(() => setFinaleStep(1),  450),   // text faded → recenter + wipe + A.12 fade (together)
      setTimeout(() => setFinaleStep(2), 1500),   // outer ring draws in
      setTimeout(() => setFinaleStep(3), 2450),   // inner ring draws in
      setTimeout(() => setFinaleStep(4), 3400),   // bring the AQ into the center
      setTimeout(() => setFinaleStep(5), 4200),   // fade in the key
      setTimeout(() => setFinaleStep(6), 4800),   // short beat, then the rest of the detail
      setTimeout(() => setPhase("report"), 5500), // settle (selection becomes interactive)
    ];
    return () => timers.forEach(clearTimeout);
  }, [phase, reducedMotion]);

  /* Show the AQ number when the center is brought forward (no count-up — it fades in). */
  useEffect(() => {
    const centerActive = (phase === "finale" && finaleStep >= 4) || phase === "report";
    if (centerActive) setDisplayNum(data.aq.utilization);
  }, [phase, finaleStep, data.aq.utilization]);

  const cogLeadKey = (data.cognitive.find(d => d.isLead) || data.cognitive[0]).key;
  const ringPalette = {
    cog: data.cognitive.map(d => d.key === cogLeadKey ? "#BFA4A4" : "#515355"),
    aff: data.affective.map(() => "#8E9BA4"),
  };

  /* Selection only becomes interactive once the report is shown. */
  const handleSelect = (key) => { if (phase !== "report") return; setActive(active === key ? null : key); };
  const advance = () => {
    if (stage < 4) { setStage(stage + 1); return; }
    setPhase("finale");   // "See your AQ" → begin the finale choreography
  };

  /* Reveal state for the chart. During the intro it's driven by the stage (stage 2
     spotlights the outer ring, 3 the inner ring, 4 fades both back with the center
     placeholder). During the finale/report it's driven by the choreography step. */
  const PRESENT = 0.62, FAINT = 0.14;
  let reveal;
  if (phase === "intro") {
    reveal = {
      outerOpacity: stage === 2 ? PRESENT : FAINT,
      innerOpacity: stage === 3 ? PRESENT : FAINT,
      outerFill: "placeholder",
      innerFill: "placeholder",
      outerLabels: stage === 2 ? "names" : "hidden",
      innerLabels: stage === 3 ? "names" : "hidden",
      centerStage: stage >= 4 ? "placeholder" : "hidden",
      centerNumber: displayNum,
    };
  } else {
    const fs = phase === "report" ? 4 : finaleStep;   // report = fully revealed
    /* Step 0 = still the example skeleton + "A.12" while the text fades. Step 1 wipes it
       clean (empty) as the ring recenters and "A.12" fades. 2 outer fills · 3 inner · 4 AQ. */
    reveal = {
      outerOpacity: fs >= 2 ? 1 : (fs === 0 ? FAINT : 0),
      innerOpacity: fs >= 3 ? 1 : (fs === 0 ? FAINT : 0),
      outerFill: fs >= 2 ? "scored" : (fs === 0 ? "placeholder" : "empty"),
      innerFill: fs >= 3 ? "scored" : (fs === 0 ? "placeholder" : "empty"),
      outerLabels: fs >= 2 ? "full" : "hidden",
      innerLabels: fs >= 3 ? "full" : "hidden",
      centerStage: fs >= 4 ? "final" : (fs === 0 ? "placeholder" : "hidden"),
      centerNumber: displayNum,
    };
  }

  /* Detail panel reveal: after the rings + AQ land, the content extends down as the
     key fades in (step 4), then it grows again for the rest a beat later (step 5). */
  const detailMounted = phase !== "intro";                                  // box present (collapsed) during the finale
  const keyVisible  = (phase === "finale" && finaleStep >= 5) || phase === "report";
  const restVisible = (phase === "finale" && finaleStep >= 6) || phase === "report";

  const introVisible = phase === "intro";
  const panel = INTRO_PANELS[Math.min(stage, INTRO_PANELS.length - 1)];
  /* Split (text left, ring right) through the whole intro, and held one beat into the
     finale so the example text fades out before the ring recenters. */
  const isSplit = phase === "intro" || (phase === "finale" && finaleStep === 0);
  /* Keep the screen-5 content mounted through the finale's first step so it fades out. */
  const showIntro = phase === "intro" || (phase === "finale" && finaleStep === 0);
  const introNode = showIntro ? (
    <div className={"aq-intro aq-intro--split" + (panel.title ? " aq-intro--title" : "") + (stage >= 1 ? " aq-intro--steps" : "")}
      style={{ opacity: introVisible ? 1 : 0, pointerEvents: introVisible ? "auto" : "none" }}
      aria-hidden={!introVisible}>
      <div className="aq-intro-inner">
        {(panel.eyebrow || panel.title) && (
          <div className="aq-intro-headline">
            {panel.eyebrow && <div className="aq-intro-eyebrow">{panel.eyebrow}</div>}
            {panel.title && <h1 className="aq-intro-title">{panel.title}</h1>}
          </div>
        )}
        <div className="aq-intro-body">
          {panel.body.map((p, i) => <p key={i}>{p}</p>)}
        </div>
        <div className="aq-intro-actions">
          <button className="aq-btn" onClick={advance}>{panel.button}</button>
        </div>
      </div>
    </div>
  ) : null;

  return (
    <div className={"aq-card" + (isSplit ? " is-wide" : "")}>
      {/* Header */}
      <header className="aq-header">
        <AdessaLogo height={22} />
        <div className="aq-meta">
          <span style={{ color: "#1F2123" }}>{data.guest.name}</span>
          {"  ·  "}{data.guest.session}
        </div>
        <h2 style={{ fontFamily: '"Fraunces", serif', fontWeight: 300, fontSize: 26, letterSpacing: "-0.01em", color: "#1F2123", margin: 0, lineHeight: 1, flexShrink: 0 }}>
          AQ
        </h2>
      </header>

      {/* Stage: the ring with a side text column. During the intro it splits — text on
          the left, ring on the right; for the finale/report it centers. */}
      <div className={"aq-stage" + (isSplit ? " is-split" : "")}>
        <div className="aq-stage-text">
          {introNode}
        </div>
        <div className="aq-stage-ring">
          <div className="aq-ring-sizer">
            <AQRing onSelect={handleSelect} active={active} data={data} size={RING_SIZE} reveal={reveal} reducedMotion={reducedMotion} />
          </div>
        </div>
      </div>

      {/* Detail — a light box that extends down as its content arrives: the key fades in
         first (box grows to fit it), then the rest of the detail a beat later */}
      {detailMounted && (
        <div className={"aq-detail" + (keyVisible ? " is-open" : "")}>
          <div className="aq-detail-clip">
            <div className="aq-detail-inner">
              {/* Reading guide */}
              {keyVisible && (
              <div className="aq-key aq-fade">
                <div className="aq-key-row">
                  <KeyItem
                    dotColor="#BFA4A4"
                    eyebrow={<><span>Outer ring</span>{"  ·  "}<span style={{ color: "#1F2123" }}>Cognitive domains</span></>}
                    sub="% of cognitive potential expressed"
                  />
                  <KeyItem
                    dotColor="#8E9BA4"
                    eyebrow={<><span>Inner ring</span>{"  ·  "}<span style={{ color: "#1F2123" }}>Affective domains</span></>}
                    sub="% relative to optimal state"
                  />
                </div>
                <KeyItem
                  dotColor="#515355"
                  eyebrow={<><span>Center</span>{"  ·  "}<span style={{ color: "#1F2123" }}>AQ</span></>}
                  sub="Leading Cognitive Domain · Overall Expression of Cognitive Potential"
                  centered
                />
              </div>
              )}

              {/* The rest of the detail content, revealed together a beat after the key */}
              {restVisible && (
              <div className="aq-fade">
                {/* Domains in detail */}
                <div style={{ marginTop: 56 }}>
                  <SectionHeader text="Domains in Detail" />
                  {data.cognitive.map((d, i) => (
                    <DomainSection key={d.key} d={d} ring="cog" accent={ringPalette.cog[i]} isLead={d.isLead} anchor={`d-${d.key}`} active={active} />
                  ))}
                  <div style={{ height: 32 }} />
                  {data.affective.map((d, i) => (
                    <DomainSection key={d.key} d={d} ring="aff" accent={ringPalette.aff[i]} anchor={`d-${d.key}`} active={active} />
                  ))}
                </div>

                {/* Footer */}
                <footer style={{ marginTop: 64, paddingTop: 32, borderTop: "1px solid rgba(81,83,85,0.10)", display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: 11, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.22em", color: "#8B8C8E" }}>
                  <span>— Adessa · {data.guest.session.split(" · ")[0]}</span>
                </footer>
              </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById("root")).render(<AQArtboard />);
</script>
</body>
</html>
